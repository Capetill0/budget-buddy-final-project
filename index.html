<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Buddy</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVIGATION -->
  <nav>
    <button onclick="showSection('dashboard')">Dashboard</button>
    <button onclick="showSection('expenses')">Monthly Expenses</button>
    <button onclick="showSection('goals')">Savings Goals</button>
  </nav>

  <!-- DASHBOARD -->
  <section id="dashboard" class="view">
    <h1>Budget Buddy Dashboard</h1>

    <input id="incomeInput" type="number" placeholder="Enter Monthly Income">
    <button id="saveIncomeBtn">Save Income</button>

    <div class="card">Total Income: $<span id="totalIncome">0</span></div>
    <div class="card">Total Expenses: $<span id="totalExpenses">0</span></div>
    <div class="card">Remaining Budget: $<span id="remainingBudget">0</span></div>
    <div class="card">Total Goal Amount: $<span id="totalGoalAmount">0</span></div>
    <div class="card">Total Saved: $<span id="totalSaved">0</span></div>

    <p id="budgetInsight"></p>
  </section>

  <!-- EXPENSES -->
  <section id="expenses" class="view hidden">
    <h2>Monthly Expenses</h2>

    <input id="expenseName" placeholder="Expense Name">
    <input id="expenseAmount" type="number" placeholder="Monthly Expense Amount">

    <select id="expenseCategory">
      <option value="">Select Category</option>
      <option value="Food">Food</option>
      <option value="Rent">Rent</option>
      <option value="Transportation">Transportation</option>
      <option value="Entertainment">Entertainment</option>
      <option value="Utilities">Utilities</option>
      <option value="Other">Other</option>
    </select>

    <button id="addExpenseBtn">Add Expense</button>

    <ul id="expenseList"></ul>
  </section>

  <!-- GOALS -->
  <section id="goals" class="view hidden">
    <h2>Savings Goals</h2>

    <input id="goalName" placeholder="Goal Name">
    <input id="goalAmount" type="number" placeholder="Goal Amount">
    <input id="goalSaved" type="number" placeholder="Amount Saved">

    <button id="addGoalBtn">Add Goal</button>

    <ul id="goalList"></ul>
  </section>

  <script src="script.js"></script>
</body>
</html>
